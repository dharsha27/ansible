- name: conditinoss
  hosts: frontend
  tasks:
   - name: print if its redhat dnf
     debug:
       msg:  "OS Family is Redhat , dnf is package manager"
     when: ansible_facts.os_family == "RedHat"

   - name: print if its Debian
     debug:
       msg:  "OS Family is Debian , app get is package manager"
     when: ansible_facts.os_family == "Debian"
    