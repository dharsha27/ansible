- name: Course Information
  hosts: local
  connection: local
  vars:
     course: "DEVOPS WITH AI" 
     duration_in_hours: 150
     is_live_session: true
     topics:
     - linux
     - ansible
     - terraform
     more_details:
       how_many_months: 4
       trainer: "SivaKumar"
  tasks:
   - name: Print Information
     debug:
       msg: >
         name: {{ course }}\n
         duration: {{ duration_in_hours }}\n
         live:  {{ is_live_session }}\n
         topics: {{ topics }}\n
         more_details: {{ more_details }}\n