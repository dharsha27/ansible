- name: Demo on Functions
  hosts: frontend
  vars:
    topics: Linux, Ansible, Terraform, Git, ShellScript
    TagMap:
       name: Ansible
       project: Roboshop
       environment: Development
    tagsList:  [
        {
            "key": "name",
            "value": "Ansible"
        },
        {
            "key": "project",
            "value": "Roboshop"
        },
        {
            "key": "environment",
            "value": "Development"
        }
    ]

  tasks:
   - name: converting string to list
     debug:
       msg: "Topics are : {{ topics | split (',')  }}"

   - name: set as a default values
     debug:
       msg: "Hi  {{ GREETING | default ('hello , i am default to print this msg')  }}"
 
   - name: convert to map to list
     debug:
       msg:  "{{ TagMap | dict2items }}"

   - name: convert to list to map
     debug:
       msg:  "{{ tagsList | items2dict }}"